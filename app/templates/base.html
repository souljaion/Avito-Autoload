<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Avito Autoload{% endblock %}</title>
    <style>
        :root {
            --bg-base: #0d1117;
            --bg-surface: #161c2d;
            --bg-elevated: #1e293b;
            --border: #21293d;
            --text-primary: #e2e8f0;
            --text-secondary: #6b7280;
            --text-muted: #374151;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-blue-dim: #1e3a5f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-base); color: var(--text-primary); }
        a { color: var(--accent-blue); }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Nav */
        nav { background: var(--bg-surface); padding: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        nav .container { display: flex; gap: 0; align-items: center; padding-top: 0; padding-bottom: 0; }
        nav a { color: var(--text-secondary); text-decoration: none; font-size: 13px; padding: 14px 16px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
        nav a:hover { color: var(--text-primary); }
        nav a.active { color: var(--text-primary); border-bottom-color: var(--accent-blue); }
        nav .logo { color: var(--accent-blue); font-weight: 700; font-size: 16px; margin-right: 20px; padding: 14px 0; border-bottom: none; }
        nav .logo:hover { color: #60a5fa; }

        /* Typography */
        h1 { font-size: 22px; margin-bottom: 16px; font-weight: 600; }
        h2 { font-size: 18px; margin-bottom: 12px; font-weight: 600; }
        h3 { font-size: 15px; font-weight: 600; }

        /* Cards */
        .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { text-align: left; padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #111827; color: var(--text-primary); }
        tbody tr:hover { background: #111827; }

        /* Buttons */
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; cursor: pointer; border: none; transition: all 0.15s; }
        .btn-primary { background: var(--accent-blue-hover); color: #fff; }
        .btn-primary:hover { background: var(--accent-blue); }
        .btn-secondary { background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-secondary:hover { background: var(--bg-elevated); color: var(--text-primary); }
        .btn-success { background: #166534; color: #34d399; }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: #7f1d1d; color: #fca5a5; }
        .btn-danger:hover { background: #991b1b; }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .actions { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }

        /* Forms */
        form .field { margin-bottom: 14px; }
        form label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary); }
        input, select, textarea {
            width: 100%; padding: 8px 12px;
            background: var(--bg-base); border: 0.5px solid var(--border);
            color: var(--text-primary); border-radius: 6px; font-size: 14px;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: rgba(59,130,246,0.35); outline: none; }
        textarea { min-height: 80px; resize: vertical; }
        input[type="checkbox"] { width: auto; }

        /* Badges */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-green { background: rgba(5,48,24,0.07); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
        .badge-yellow { background: rgba(65,36,2,0.07); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
        .badge-red { background: rgba(127,29,29,0.2); color: #fca5a5; border: 1px solid rgba(252,165,165,0.2); }
        .badge-gray { background: #1f2937; color: var(--text-secondary); border: 1px solid var(--text-muted); }
        .badge-blue { background: var(--accent-blue-dim); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }

        /* Flash */
        .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; border: 1px solid; }
        .flash-success { background: rgba(5,48,24,0.15); color: #34d399; border-color: rgba(52,211,153,0.2); }
        .flash-error { background: rgba(127,29,29,0.15); color: #fca5a5; border-color: rgba(252,165,165,0.2); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">Avito Autoload</a>
            <a href="/products">Товары</a>
            <a href="/models">Модели</a>
            <a href="/products/bulk-edit">Драфты</a>
            <a href="/analytics">Аналитика</a>
            <a href="/schedule">Расписание</a>
            <a href="/accounts">Аккаунты</a>
        </div>
    </nav>
    <div class="container">
        {% if request.query_params.get("error") %}
        <div class="flash flash-error">{{ request.query_params.get("error") }}</div>
        {% endif %}
        {% if request.query_params.get("success") %}
        <div class="flash flash-success">{{ request.query_params.get("success") }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
