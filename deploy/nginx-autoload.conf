server {
    server_name autoload.souljaion.ru;

    client_max_body_size 200M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/autoload.souljaion.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/autoload.souljaion.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = autoload.souljaion.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name autoload.souljaion.ru;

    client_max_body_size 200M;

    return 404; # managed by Certbot
}
