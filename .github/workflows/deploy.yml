name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: avito_user
          POSTGRES_PASSWORD: avito_pass
          POSTGRES_DB: avito_autoload_test
        ports:
          - "5433:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://avito_user:avito_pass@localhost:5433/avito_autoload_test
      TESTING: "1"
      SECRET_KEY: test-secret-key-for-ci-only-not-production
      ENCRYPTION_KEY: 6Ppc46dMCsf_4HmDJRR0KlTKkg4Tn0VcXcS-vHKilf0=
      BASIC_AUTH_USER: admin
      BASIC_AUTH_PASSWORD: StrongTestPassword123!
      BASE_URL: http://localhost:8001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Start server
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8001 &
          sleep 3

      - name: Run tests
        run: pytest tests/ -x -q

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 8m
          script: |
            set -e
            echo "==> Deploying avito-autoload..."
            cd /home/claude2/avito-autoload
            echo "==> git pull"
            git pull origin main
            echo "==> pip install"
            ./venv/bin/pip install -r requirements.txt --quiet
            echo "==> alembic upgrade"
            ./venv/bin/alembic upgrade head
            echo "==> systemctl restart"
            sudo systemctl restart avito-autoload
            sleep 3
            echo "==> healthcheck"
            curl -fsS http://localhost:8001/health > /dev/null || { echo "ERROR: healthcheck failed after deploy"; exit 1; }
            echo "==> Deploy successful"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy to production failed. Check the SSH deploy step output above."
          exit 1
